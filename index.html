<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>closekit — tools for savvy Close CRM customers</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header img {
      width: 280px;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      margin: 0 auto 36px;
      display: block;
      transform: rotate(-1.5deg);
    }

    .site-name {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.03em;
    }

    .site-name span {
      color: #6366f1;
    }

    .tagline {
      margin-top: 8px;
      font-size: 1rem;
      color: #6b7280;
    }

    .tools {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .tool {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 22px 26px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    .tool:hover {
      border-color: #6366f1;
      box-shadow: 0 4px 20px rgba(99,102,241,0.12);
      transform: translateY(-1px);
    }

    .tool-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tool-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #6366f1;
    }

    .tool-arrow {
      font-size: 0.9rem;
      color: #d1d5db;
      transition: color 0.15s, transform 0.15s;
    }

    .tool:hover .tool-arrow {
      color: #6366f1;
      transform: translateX(2px);
    }

    .tool-desc {
      font-size: 0.875rem;
      color: #6b7280;
      line-height: 1.6;
    }

    footer {
      margin-top: 72px;
      font-size: 0.78rem;
      color: #b0b7c3;
    }

    footer a {
      color: #9ca3af;
      text-decoration: none;
    }

    footer a:hover {
      color: #6b7280;
    }
  </style>
</head>
<body>

  <header>
    <img src="ralph-wave.gif" alt="Vibe Coding — I'm a Developer Now">
    <p class="site-name"><span>closekit</span></p>
    <p class="tagline">unofficial tools for savvy Close CRM customers</p>
  </header>

  <main class="tools">
    <a href="https://robin.closekit.com" class="tool">
      <div class="tool-header">
        <span class="tool-name">Robin</span>
        <span class="tool-arrow">→</span>
      </div>
      <span class="tool-desc">Automated round-robin lead distribution for Close.</span>
    </a>
    <a href="https://clay.closekit.com" class="tool">
      <div class="tool-header">
        <span class="tool-name">Close → Clay Sync</span>
        <span class="tool-arrow">→</span>
      </div>
      <span class="tool-desc">Sync Close Leads or Contacts to Clay workbooks.</span>
    </a>
  </main>

  <footer>tools built and maintained by <a href="https://x.com/nickpersico" target="_blank">@nickpersico</a> using AI</footer>

</body>
</html>
